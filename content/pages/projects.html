<!--
  Projekte / Projects sub-page
  Native HTML5 video, self-hosted. No YouTube/Vimeo, no third-party JS,
  no tracking, no cookie banner trigger.

  Storage convention (final paths depend on chosen stack):
    Static / Astro / Next.js : public/videos/{slug}.{mp4,webm}  +  public/videos/{slug}-poster.jpg
    Ghost                    : /content/files/{year}/{month}/{slug}.{mp4,webm} (uploaded via Admin)
    Pure HTML                : /assets/videos/{slug}.{mp4,webm}

  Source files (the originals from Higgsfield) live in:
    content/pages/videos/  (this dir, gitignored except this README)
  Encoded outputs (mp4 + webm + poster) get copied into the framework's
  public/static dir at build time.

  Encoding recipe (see content/pages/videos/README.md for full pipeline):
    Target: ≤3 MB per clip, 720p, ~24-30 fps, faststart for instant playback.
-->
<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
  <meta charset="UTF-8">
  <title>Projekte | {{SITE_NAME}}</title>
  <meta name="description" content="Kurze Demos der Projekte, an denen wir gerade arbeiten — generiert mit Higgsfield, nativ eingebettet.">
  <meta name="robots" content="index, follow">
</head>
<body>

<main>
  <header>
    <h1>Projekte</h1>
    <p>
      Kurze Demos – meist 10 bis 30 Sekunden – zu dem, woran wir gerade
      bauen. Alle Clips sind direkt eingebettet, kein YouTube,
      kein Vimeo, kein Tracking.
    </p>
  </header>

  <!--
    PROJEKT-EINTRAG (kopieren pro Projekt)
    - {{slug}}     : Datei-Basisname, kebab-case (z.B. "agent-dashboard-v1")
    - {{title}}    : Anzeigename
    - {{summary}}  : 1–2 Sätze, was das Projekt macht
    - {{duration}} : z.B. "0:18"
    - {{poster}}   : Standbild (.jpg, ~50 KB) für Pre-Load und Social Sharing
    - <video> Attribute:
        muted + playsinline   : iOS Safari erlaubt Inline-Wiedergabe
        loop                  : Schleife (sinnvoll bei <30s Demos)
        preload="metadata"    : kein Daten-Download bis User play drückt
        controls              : native UI; bei autoplay weglassen wenn UI clean sein soll
    - <source> Reihenfolge: WebM zuerst (kleiner) → MP4 als Fallback
  -->

  <section class="projects">

    <article class="project" id="project-{{slug}}">
      <h2>{{title}}</h2>
      <p class="summary">{{summary}}</p>
      <figure>
        <video
          controls
          muted
          playsinline
          loop
          preload="metadata"
          poster="/videos/{{slug}}-poster.jpg"
          width="1280" height="720">
          <source src="/videos/{{slug}}.webm" type="video/webm">
          <source src="/videos/{{slug}}.mp4"  type="video/mp4">
          <p>
            Dein Browser unterstützt kein HTML5-Video.
            <a href="/videos/{{slug}}.mp4">Clip direkt herunterladen</a>.
          </p>
        </video>
        <figcaption>
          <span class="duration">{{duration}}</span>
          <!-- Optional: Status, Stack, Live-Link -->
          <!-- <a href="{{live_url}}" rel="external">Zur Live-Demo →</a> -->
        </figcaption>
      </figure>
    </article>

    <!-- Weitere <article class="project"> Einträge nach gleichem Muster -->

  </section>

  <footer>
    <p>
      <small>
        Demos generiert mit <a href="https://higgsfield.ai" rel="external nofollow">Higgsfield</a>,
        encodiert mit ffmpeg, gehostet direkt auf {{SITE_NAME}}.
      </small>
    </p>
  </footer>
</main>

</body>
</html>
