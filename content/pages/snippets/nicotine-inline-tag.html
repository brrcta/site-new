<!--
  NICOTINE INLINE TAG — minimum-viable disclosure for inline product mentions
  Use directly next to a product link or in a product bio/description block,
  where the full <aside> warning would be too heavy.

  Pairs with the full nicotine-warning-block on the same page. Do NOT use
  the inline tag as the only warning on a page that promotes a nicotine
  product — pair it with either the full block above-the-fold OR the
  footer-disclaimers block site-wide. Both is best.

  Drop-in HTML:
-->
<span class="tag tag--nicotine" aria-label="Werbung, 18 plus, enthält Nikotin, macht abhängig" lang="de">
  <strong>18+</strong> · Werbung · enthält Nikotin · macht stark abhängig
</span>

<!--
  Variant for use inside a product card / bio paragraph:
-->
<p class="product-bio__warning" lang="de">
  <strong>Hinweis:</strong> nikotinhaltiges Produkt, nur für Erwachsene
  ab&nbsp;18&nbsp;Jahren. Nikotin macht stark abhängig. Affiliate-Link
  („Werbung") — wir machen keine Heilaussagen.
</p>
