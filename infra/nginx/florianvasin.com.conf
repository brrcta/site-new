server {
    listen 80;
    server_name florianvasin.com www.florianvasin.com;

    root /var/www/florianvasin.com;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/guestbook {
        proxy_pass http://127.0.0.1:8041;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type $http_content_type;
    }
}
# After setup, run: sudo certbot --nginx -d florianvasin.com -d www.florianvasin.com
