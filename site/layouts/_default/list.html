{{ define "main" }}
<section class="feed" id="feed">
  <h2 class="section-label">// {{ .Title }}</h2>

  <div class="feed-filters">
    <a href="/" class="filter-btn">all</a>
    <a href="/tags/writing" class="filter-btn {{ if eq .Title "writing" }}active{{ end }}">writing</a>
    <a href="/tags/thoughts" class="filter-btn {{ if eq .Title "thoughts" }}active{{ end }}">thoughts</a>
  </div>

  <div class="feed-list">
    {{ range .Pages }}
    <article class="feed-item">
      <div class="feed-item-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
        {{ range .Params.tags }}<span class="tag tag--{{ . }}">{{ . }}</span>{{ end }}
      </div>
      <h3 class="feed-item-title">
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </h3>
      <p class="feed-item-teaser">
        {{ .Summary | truncate 150 "..." }}
      </p>
      <a href="{{ .Permalink }}" class="read-more">Read more →</a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
